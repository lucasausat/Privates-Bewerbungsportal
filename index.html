<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systemprüfung</title>

<style>
body{
    margin:0;
    background:#0c0d10;
    color:#e3e5e8;
    font-family:monospace;
    overflow:hidden;
}

/* PANEL */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    background:#1a1b1e;
    padding:25px;
    border-radius:12px;
}

.title{font-size:18px;}
.phase{font-size:12px;color:#9ca3af;margin-top:5px;}

.progress{height:6px;background:#111;margin-top:15px;}
.bar{height:100%;width:0%;background:#5865F2;}

.log{
    font-size:11px;
    margin-top:15px;
    color:#9ca3af;
    height:90px;
    overflow:hidden;
}

/* TAKEOVER */
#takeover{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    color:#00ff9f;
    padding:30px;
    display:none;
}

/* APRIL */
.april{
    position:fixed;
    bottom:10px;
    right:15px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">Systemprüfung läuft...</div>
    <div class="phase" id="phase">Phase 1/4</div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="log" id="log"></div>
</div>

<div id="takeover"></div>

<script>

/* FAKE DATA */
function rand(n=255){return Math.floor(Math.random()*n);}
function fakeIP(){return `${rand()}.${rand()}.${rand()}.${rand()}`;}
function fakeLocation(){
    const cities=["Berlin","Hamburg","Frankfurt","München","Köln"];
    return cities[Math.random()*cities.length|0];
}
function getBrowser(){
    return navigator.userAgent;
}

/* ELEMENTS */
const bar=document.getElementById("bar");
const log=document.getElementById("log");
const phaseText=document.getElementById("phase");

let p=0;
let phase=1;

/* PHASE SYSTEM */
function updatePhase(){
    phaseText.innerText="Phase "+phase+"/4";
}

/* LOGS */
function addLog(text){
    log.innerHTML+="<div>"+text+"</div>";
}

/* MAIN LOOP */
const main=setInterval(()=>{

    p+=Math.random()*8;
    if(p>100)p=100;

    bar.style.width=p+"%";

    if(phase===1){
        addLog("System scan gestartet...");
        addLog("Dateien werden überprüft...");
        if(p>30){phase=2;updatePhase();}
    }

    else if(phase===2){
        addLog("Netzwerk wird analysiert...");
        addLog("Browser erkannt: "+getBrowser());
        if(p>60){phase=3;updatePhase();}
    }

    else if(phase===3){
        addLog("Verdächtige Aktivität erkannt...");
        addLog("Download wird vorbereitet...");
        if(p>85){phase=4;updatePhase();}
    }

    else if(phase===4){
        addLog("📥 Datei wird heruntergeladen...");
        if(p>=100){
            clearInterval(main);
            setTimeout(triggerTakeover,1500);
        }
    }

},500);

/* TAKEOVER */
function triggerTakeover(){

    const t=document.getElementById("takeover");
    t.style.display="block";

    const ip=fakeIP();
    const loc=fakeLocation();

    let lines=[
        "SYSTEM BREACH DETECTED",
        "IP: "+ip,
        "LOCATION: "+loc,
        "DEVICE: "+getBrowser(),
        "ACCESSING FILES...",
        "READING DATA...",
        "CAMERA ACTIVE...",
        "UPLOADING..."
    ];

    let i=0;

    const int=setInterval(()=>{
        t.innerHTML+=lines[i]+"<br>";
        i++;

        if(i>=lines.length){
            clearInterval(int);
            chaos();
        }

    },400);
}

/* CHAOS */
function chaos(){

    // Maus Lag
    document.addEventListener("mousemove", ()=>{
        document.body.style.transform=`translate(${Math.sin(Date.now()/40)*5}px)`;
    });

    // Fake Cam
    const cam=document.createElement("div");
    cam.style.position="fixed";
    cam.style.bottom="20px";
    cam.style.right="20px";
    cam.style.width="180px";
    cam.style.height="110px";
    cam.style.background="#111";
    cam.style.border="2px solid #00ff9f";
    cam.style.fontSize="11px";
    cam.style.padding="5px";
    cam.innerText="📷 Kamera aktiv...";
    document.body.appendChild(cam);

    // Lock
    document.body.style.pointerEvents="none";
}

/* AUTO END AFTER 30 MIN */
setTimeout(()=>{
    resolvePrank();
}, 1800000); // 30 Minuten

/* END */
function resolvePrank(){

    document.body.style.pointerEvents="auto";

    const msg=document.createElement("div");
    msg.className="april";
    msg.innerText="🤡 April April – war nur Spaß";
    document.body.appendChild(msg);
}

</script>

</body>
</html>
