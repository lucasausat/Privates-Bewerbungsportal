<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bewerbungsportal</title>

<style>
:root {
    --bg:#1a1b1e;
    --sidebar:#202225;
    --card:#2a2d31;
    --accent:#5865F2;
    --danger:#ed4245;
    --text:#e3e5e8;
    --muted:#9ca3af;
}

/* 🔐 ULTRA MODERN LOCK SCREEN */
#encryptionScreen {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at top,#202225,#0e0f11);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.lock-card {
    width:360px;
    background:var(--card);
    padding:30px;
    border-radius:16px;
    box-shadow:0 30px 80px rgba(0,0,0,0.7);
    text-align:center;
}

.lock-title {
    font-size:18px;
    font-weight:600;
}

.lock-sub {
    font-size:13px;
    color:var(--muted);
    margin-top:8px;
}

.progress {
    margin-top:20px;
    height:6px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
}

.progress-bar {
    height:100%;
    width:0%;
    background:var(--accent);
}

.log-box {
    margin-top:15px;
    font-size:11px;
    color:var(--muted);
    text-align:left;
    max-height:80px;
    overflow:hidden;
}

/* UI */
body {
    margin:0;
    font-family:system-ui;
    background:linear-gradient(#1a1b1e,#111);
    color:var(--text);
}

.app { display:flex; height:100vh; }

.sidebar {
    width:240px;
    background:var(--sidebar);
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.main { flex:1; padding:30px; }

.global-warning {
    margin-top:20px;
    background:rgba(237,66,69,0.1);
    padding:10px;
    border-radius:8px;
}

/* LOGIN */
.login-box {
    margin-top:20px;
    background:var(--card);
    padding:20px;
    border-radius:10px;
    max-width:300px;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    background:#111;
    border:none;
    color:white;
    border-radius:6px;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:var(--accent);
    color:white;
    cursor:pointer;
}

/* GLITCH */
.glitch { animation:glitch 0.2s infinite; }
@keyframes glitch {
    50%{transform:translate(-3px,3px);}
}
</style>
</head>

<body>

<!-- 🔐 LOCK -->
<div id="encryptionScreen">
    <div class="lock-card">
        <div class="lock-title">Sichere Verbindung wird aufgebaut</div>
        <div class="lock-sub" id="encText">Initialisierung...</div>

        <div class="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="log-box" id="logBox"></div>
    </div>
</div>

<!-- 💻 UI -->
<div class="app">

    <aside class="sidebar">
        <div>Bewerbung</div>
        <div>System offline</div>
    </aside>

    <main class="main">
        <h1>Bewerbungsportal</h1>

        <div class="global-warning" id="warning">
            Bewerbungen sind derzeit geschlossen.
        </div>

        <!-- 💀 FAKE LOGIN -->
        <div class="login-box">
            <input placeholder="User ID">
            <input placeholder="Passwort" type="password">
            <button onclick="fakeLogin()">Login</button>

            <div class="progress" style="margin-top:10px;">
                <div class="progress-bar" id="loginBar"></div>
            </div>

            <p id="status"></p>
        </div>
    </main>

</div>

<script>

/* ⏳ ZEIT */
function getDates(){
    const y = new Date().getFullYear();
    return {
        open:new Date(y,2,31,23,50),
        close:new Date(y,3,1,23,50)
    };
}

function isOpen(){
    const now=new Date();
    const {open,close}=getDates();
    return now>=open && now<close;
}

/* 🔐 ENCRYPTION + LOGS */
const encMsgs=[
"TLS Handshake...",
"Authentifizierung...",
"Server wird erreicht...",
"Daten werden verschlüsselt..."
];

const logs=[
"[SYS] Verbindung initiiert",
"[SEC] Zertifikat geprüft",
"[NET] Paketverlust erkannt",
"[ERR] Retry...",
"[OK] Verbindung stabil"
];

function runEncryption(){
    const text=document.getElementById("encText");
    const bar=document.getElementById("bar");
    const logBox=document.getElementById("logBox");

    let p=0,i=0;

    let int=setInterval(()=>{
        text.innerText=encMsgs[i%encMsgs.length];
        i++;

        p+=15;
        bar.style.width=p+"%";

        logBox.innerHTML+="<div>"+logs[Math.floor(Math.random()*logs.length)]+"</div>";

        if(p>=100){
            clearInterval(int);

            setTimeout(()=>{
                if(isOpen()){
                    document.getElementById("encryptionScreen").style.display="none";
                    startFakeSystem();
                }else{
                    text.innerText="🔒 Kein Zugriff – System gesperrt";
                }
            },1000);
        }
    },700);
}

runEncryption();

/* 🤡 FAKE SYSTEM */
function startFakeSystem(){

    const warn=document.getElementById("warning");

    const fakeMsgs=[
        "Server nicht erreichbar...",
        "API Fehler...",
        "Datenbank Timeout...",
        "Verbindung getrennt...",
        "User wird überprüft..."
    ];

    setInterval(()=>{
        warn.innerText=fakeMsgs[Math.floor(Math.random()*fakeMsgs.length)];
    },3000);

}

/* 💀 LOGIN BUG */
function fakeLogin(){
    const bar=document.getElementById("loginBar");
    const status=document.getElementById("status");

    let p=0;

    let int=setInterval(()=>{
        p+=Math.random()*20;
        if(p>=99){
            p=99;
            clearInterval(int);

            status.innerText="❌ Fehler... Zugriff verweigert";
        }

        bar.style.width=p+"%";
        status.innerText="Verbindung wird hergestellt...";
    },300);
}

/* 🤡 APRIL ESCALATION */
function aprilPrank(){
    const now=new Date();

    if(now.getMonth()===3 && now.getDate()===1){
        setTimeout(()=>{
            document.body.classList.add("glitch");

            setTimeout(()=>{
                document.body.innerHTML=`
                <h1 style="padding:100px;">
                💀 SYSTEM ÜBERNOMMEN<br><br>
                Daten werden kopiert...
                </h1>`;
            },5000);

            setTimeout(()=>{
                document.body.innerHTML=`
                <h1 style="padding:100px;">
                🤡 APRIL APRIL 😂
                </h1>`;
            },10000);

        },8000);
    }
}

aprilPrank();

</script>

</body>
</html>
