<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Check</title>

<style>
body{
    margin:0;
    background:#0b0c10;
    color:#e5e7eb;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* CARD */
.card{
    width:420px;
    background:#111317;
    border-radius:16px;
    padding:25px;
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
    animation:fadeIn 1s ease;
}

.title{font-size:18px;font-weight:600;}
.subtitle{font-size:13px;color:#9ca3af;margin-top:5px;}

.progress{
    margin-top:20px;
    height:6px;
    background:#1f2937;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#6366f1;
    transition:width 0.3s linear;
}

/* STATUS */
.status{
    margin-top:15px;
    font-size:13px;
    color:#9ca3af;
}

/* TAKEOVER */
#takeover{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    color:#00ff9f;
    padding:40px;
    display:none;
    font-family:monospace;
}

/* FILE DELETE */
.delete{
    margin-top:20px;
    color:#ff4d4d;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.4;}
}

/* APRIL */
.april{
    position:fixed;
    bottom:10px;
    right:15px;
    font-size:12px;
    color:#888;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Sicherheitsprüfung läuft...</div>
    <div class="subtitle" id="phase">Initialisierung</div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="status" id="status">System wird vorbereitet...</div>

    <input id="nameInput" placeholder="Optional: Name eingeben..." style="margin-top:15px;width:100%;padding:10px;border-radius:8px;border:none;background:#1f2937;color:white;">
</div>

<div id="takeover"></div>

<script>

/* DATA */
function rand(n=255){return Math.floor(Math.random()*n);}
function fakeIP(){return `${rand()}.${rand()}.${rand()}.${rand()}`;}
function fakeLocation(){
    const cities=["Berlin","Hamburg","Frankfurt","München","Köln"];
    return cities[Math.random()*cities.length|0];
}

function getName(){
    const input=document.getElementById("nameInput").value;
    return input || "Unbekannt";
}

const bar=document.getElementById("bar");
const phase=document.getElementById("phase");
const status=document.getElementById("status");

let p=0;
let step=0;

/* MAIN LOOP */
const loop=setInterval(()=>{

    p+=Math.random()*5;
    if(p>100)p=100;

    bar.style.width=p+"%";

    if(step===0){
        phase.innerText="System Scan";
        status.innerText="Dateien werden analysiert...";
        if(p>25)step=1;
    }

    else if(step===1){
        phase.innerText="Netzwerk Analyse";
        status.innerText="Browser erkannt: "+navigator.userAgent.slice(0,40)+"...";
        if(p>50)step=2;
    }

    else if(step===2){
        phase.innerText="Account Zugriff";
        status.innerText="Discord Token wird überprüft...";
        if(p>75)step=3;
    }

    else if(step===3){
        phase.innerText="Download";
        status.innerText="📥 Datenpaket wird geladen...";
        if(p>=100){
            clearInterval(loop);
            setTimeout(takeover,1200);
        }
    }

},300);

/* TAKEOVER */
function takeover(){

    const t=document.getElementById("takeover");
    t.style.display="block";

    const ip=fakeIP();
    const loc=fakeLocation();
    const name=getName();

    let lines=[
        "ACCESS GRANTED",
        "USER: "+name,
        "IP: "+ip,
        "LOCATION: "+loc,
        "DEVICE: "+navigator.platform,
        "DISCORD ACCOUNT FOUND",
        "READING PRIVATE DATA...",
        "SYNCING FILES..."
    ];

    let i=0;

    const int=setInterval(()=>{
        t.innerHTML+=lines[i]+"<br>";
        i++;

        if(i>=lines.length){
            clearInterval(int);
            deleteFiles();
        }

    },350);
}

/* DELETE FILES */
function deleteFiles(){

    const t=document.getElementById("takeover");

    let files=[
        "photos.jpg gelöscht",
        "documents.pdf gelöscht",
        "discord.db gelöscht",
        "system32.dll gelöscht"
    ];

    let i=0;

    const int=setInterval(()=>{
        t.innerHTML+=`<div class="delete">🗑️ ${files[i]}</div>`;
        i++;

        if(i>=files.length){
            clearInterval(int);
            setTimeout(endPrank,4000);
        }

    },700);
}

/* END */
function endPrank(){

    const msg=document.createElement("div");
    msg.className="april";
    msg.innerText="🤡 April April – alles fake";
    document.body.appendChild(msg);
}

</script>

</body>
</html>
