<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Check</title>

<style>
body{
    margin:0;
    background:#000;
    color:#e5e7eb;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* GLITCH BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.02) 0px,
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events:none;
}

/* CARD */
.card{
    width:420px;
    background:#0d0f14;
    border-radius:16px;
    padding:25px;
    box-shadow:0 0 60px rgba(99,102,241,0.2);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:scale(0.95);}
    to{opacity:1;transform:scale(1);}
}

.title{font-size:18px;font-weight:600;}
.subtitle{font-size:13px;color:#9ca3af;margin-top:5px;}

.progress{
    margin-top:20px;
    height:6px;
    background:#1f2937;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#6366f1;
    transition:width 0.2s linear;
}

.status{
    margin-top:15px;
    font-size:13px;
    color:#9ca3af;
}

/* TERMINAL */
#takeover{
    position:fixed;
    inset:0;
    background:#000;
    color:#00ff9f;
    padding:40px;
    display:none;
    font-family:monospace;
    font-size:14px;
}

/* GLITCH TEXT */
.glitch{
    color:#ff4d4d;
    animation:glitch 0.2s infinite;
}

@keyframes glitch{
    0%{transform:translate(1px,0);}
    50%{transform:translate(-1px,0);}
    100%{transform:translate(1px,0);}
}

/* DELETE */
.delete{
    color:#ff0000;
    animation:blink 0.7s infinite;
}

@keyframes blink{50%{opacity:0.2;}}

/* CRASH */
#crash{
    position:fixed;
    inset:0;
    background:#050505;
    color:#e5e7eb;
    display:none;
    font-family:monospace;
    padding:40px;
    font-size:16px;
}

/* APRIL */
.april{
    position:fixed;
    bottom:10px;
    right:15px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Sicherheitsprüfung läuft...</div>
    <div class="subtitle" id="phase">Initialisierung</div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="status" id="status">System wird vorbereitet...</div>
</div>

<div id="takeover"></div>
<div id="crash"></div>

<audio id="heartbeat" src="https://www.soundjay.com/heartbeat/sounds/heartbeat-01.mp3" loop></audio>
<audio id="error" src="https://www.soundjay.com/button/sounds/beep-07.mp3"></audio>

<script>

/* HELPERS */
function rand(n=255){return Math.floor(Math.random()*n);}
function fakeIP(){return `${rand()}.${rand()}.${rand()}.${rand()}`;}

/* GEO */
let locationText="Unbekannt";
if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
        locationText="Lat "+pos.coords.latitude.toFixed(2)+
                     " Lon "+pos.coords.longitude.toFixed(2);
    });
}

/* ELEMENTS */
const bar=document.getElementById("bar");
const phase=document.getElementById("phase");
const status=document.getElementById("status");

let p=0;
let step=0;

/* INTENSE START DELAY */
setTimeout(()=>{

const loop=setInterval(()=>{

    p+=Math.random()*8;
    if(p>100)p=100;

    bar.style.width=p+"%";

    if(step===0){
        phase.innerText="Deep Scan";
        status.innerText="Kernel wird analysiert...";
        if(p>25)step=1;
    }

    else if(step===1){
        phase.innerText="Netzwerk Zugriff";
        status.innerText="Verbinde zu "+fakeIP();
        if(p>50)step=2;
    }

    else if(step===2){
        phase.innerText="Standort Tracking";
        status.innerText="Zugriff auf GPS...";
        if(p>75)step=3;
    }

    else if(step===3){
        phase.innerText="Root Zugriff";
        status.innerText="Adminrechte erhalten...";
        if(p>=100){
            clearInterval(loop);
            setTimeout(startTakeover,800);
        }
    }

},200);

},1500);

/* TAKEOVER */
function startTakeover(){

    document.getElementById("heartbeat").play();

    const t=document.getElementById("takeover");
    t.style.display="block";

    let lines=[
        ">>> ACCESS GRANTED",
        ">>> IP: "+fakeIP(),
        ">>> LOCATION: "+locationText,
        ">>> DEVICE: "+navigator.platform,
        ">>> SYNCING FILES...",
        ">>> CAMERA ENABLED",
        ">>> MICROPHONE ACTIVE",
        ">>> UPLOADING DATA..."
    ];

    let i=0;

    const int=setInterval(()=>{
        t.innerHTML+=lines[i]+"<br>";
        i++;

        if(i>=lines.length){
            clearInterval(int);
            deleteFiles();
        }

    },250);
}

/* DELETE */
function deleteFiles(){

    const t=document.getElementById("takeover");

    let files=[
        "photos",
        "documents",
        "discord.db",
        "system32"
    ];

    let i=0;

    const int=setInterval(()=>{
        t.innerHTML+=`<div class="delete">DELETING ${files[i]}...</div>`;
        document.getElementById("error").play();
        i++;

        if(i>=files.length){
            clearInterval(int);
            setTimeout(crash,2000);
        }

    },500);
}

/* CRASH */
function crash(){

    const c=document.getElementById("crash");
    c.style.display="block";

    c.innerHTML=`
    <div class="glitch">SYSTEM FAILURE</div><br><br>
    MEMORY CORRUPTED<br>
    CODE: 0x000F<br><br>
    REBOOT REQUIRED
    `;

    setTimeout(endPrank,4000);
}

/* END */
function endPrank(){

    const msg=document.createElement("div");
    msg.className="april";
    msg.innerText="🤡 April April – war nur Spaß";
    document.body.appendChild(msg);
}

</script>

</body>
</html>
