<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Check</title>

<style>
body{
    margin:0;
    background:#0b0c10;
    color:#e5e7eb;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* CARD */
.card{
    width:420px;
    background:#111317;
    border-radius:16px;
    padding:25px;
    box-shadow:0 20px 60px rgba(0,0,0,0.8);
}

.title{font-size:18px;font-weight:600;}
.subtitle{font-size:13px;color:#9ca3af;margin-top:5px;}

.progress{
    margin-top:20px;
    height:6px;
    background:#1f2937;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#6366f1;
    transition:width 0.25s linear;
}

.status{
    margin-top:15px;
    font-size:13px;
    color:#9ca3af;
}

/* TAKEOVER */
#takeover{
    position:fixed;
    inset:0;
    background:#000;
    color:#00ff9f;
    padding:40px;
    display:none;
    font-family:monospace;
}

/* DELETE */
.delete{
    color:#ff4d4d;
    animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.4;}}

/* CRASH */
#crash{
    position:fixed;
    inset:0;
    background:#0a0a0a;
    color:#e5e7eb;
    display:none;
    font-family:monospace;
    padding:40px;
}

/* APRIL */
.april{
    position:fixed;
    bottom:10px;
    right:15px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Sicherheitsprüfung läuft...</div>
    <div class="subtitle" id="phase">Initialisierung</div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="status" id="status">System wird vorbereitet...</div>
</div>

<div id="takeover"></div>
<div id="crash"></div>

<!-- SOUNDS -->
<audio id="heartbeat" src="https://www.soundjay.com/heartbeat/sounds/heartbeat-01.mp3" loop></audio>
<audio id="error" src="https://www.soundjay.com/button/sounds/beep-07.mp3"></audio>

<script>

/* DATA */
function rand(n=255){return Math.floor(Math.random()*n);}
function fakeIP(){return `${rand()}.${rand()}.${rand()}.${rand()}`;}

let locationText="Unbekannt";

/* TRY REAL GEO */
if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
        locationText="Lat "+pos.coords.latitude.toFixed(2)+
                     " Lon "+pos.coords.longitude.toFixed(2);
    });
}

/* ELEMENTS */
const bar=document.getElementById("bar");
const phase=document.getElementById("phase");
const status=document.getElementById("status");

let p=0;
let step=0;

/* MAIN */
const loop=setInterval(()=>{

    p+=Math.random()*6;
    if(p>100)p=100;

    bar.style.width=p+"%";

    if(step===0){
        phase.innerText="System Scan";
        status.innerText="Dateien werden analysiert...";
        if(p>20)step=1;
    }

    else if(step===1){
        phase.innerText="Netzwerk Analyse";
        status.innerText="IP erkannt: "+fakeIP();
        if(p>40)step=2;
    }

    else if(step===2){
        phase.innerText="Standort Tracking";
        status.innerText="Standort: "+locationText;
        if(p>60)step=3;
    }

    else if(step===3){
        phase.innerText="Account Zugriff";
        status.innerText="Discord & Browser Daten werden gelesen...";
        if(p>80)step=4;
    }

    else if(step===4){
        phase.innerText="Download";
        status.innerText="📥 Datenpaket wird geladen...";
        if(p>=100){
            clearInterval(loop);
            setTimeout(startTakeover,1000);
        }
    }

},250);

/* TAKEOVER */
function startTakeover(){

    document.getElementById("heartbeat").play();

    const t=document.getElementById("takeover");
    t.style.display="block";

    let lines=[
        "ACCESS GRANTED",
        "IP: "+fakeIP(),
        "LOCATION: "+locationText,
        "DEVICE: "+navigator.platform,
        "SYNCING DATA...",
        "CAMERA ACTIVE...",
        "UPLOADING FILES..."
    ];

    let i=0;

    const int=setInterval(()=>{
        t.innerHTML+=lines[i]+"<br>";
        i++;

        if(i>=lines.length){
            clearInterval(int);
            deleteFiles();
        }

    },300);
}

/* DELETE */
function deleteFiles(){

    const t=document.getElementById("takeover");

    let files=[
        "photos gelöscht",
        "documents gelöscht",
        "discord.db gelöscht",
        "system files gelöscht"
    ];

    let i=0;

    const int=setInterval(()=>{
        t.innerHTML+=`<div class="delete">🗑️ ${files[i]}</div>`;
        document.getElementById("error").play();
        i++;

        if(i>=files.length){
            clearInterval(int);
            setTimeout(crash,3000);
        }

    },600);
}

/* CRASH */
function crash(){

    document.body.style.pointerEvents="none";

    const c=document.getElementById("crash");
    c.style.display="block";

    c.innerHTML=`
    SYSTEM ERROR<br><br>
    MEMORY FAILURE<br>
    CODE: 0x000F<br><br>
    PLEASE RESTART SYSTEM
    `;

    setTimeout(endPrank,5000);
}

/* END */
function endPrank(){

    document.body.style.pointerEvents="auto";

    const msg=document.createElement("div");
    msg.className="april";
    msg.innerText="🤡 April April – war nur Spaß";
    document.body.appendChild(msg);
}

</script>

</body>
</html>
