<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bewerbungsportal</title>

<style>
:root {
    --bg:#1a1b1e;
    --sidebar:#202225;
    --card:#2a2d31;
    --accent:#5865F2;
    --danger:#ed4245;
    --text:#e3e5e8;
    --muted:#9ca3af;
}

body {
    margin:0;
    font-family:system-ui;
    background:linear-gradient(#1a1b1e,#111);
    color:var(--text);
    overflow:hidden;
}

/* TERMINAL OVERLAY */
#terminal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    font-size:11px;
    color:#00ff9f;
    opacity:0.08;
    pointer-events:none;
    font-family:monospace;
    padding:10px;
}

/* LOCK SCREEN */
#encryptionScreen {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at top,#202225,#0e0f11);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.lock-card {
    width:360px;
    background:var(--card);
    padding:30px;
    border-radius:16px;
    text-align:center;
}

.progress {
    margin-top:20px;
    height:6px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
}

.progress-bar {
    height:100%;
    width:0%;
    background:var(--accent);
}

/* UI */
.app { display:flex; height:100vh; }

.sidebar {
    width:240px;
    background:var(--sidebar);
    padding:20px;
}

.main { flex:1; padding:30px; }

.login-box {
    margin-top:20px;
    background:var(--card);
    padding:20px;
    border-radius:10px;
    max-width:300px;
}

input,button{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
}

input{ background:#111; color:white; }
button{ background:var(--accent); color:white; cursor:pointer; }

/* FILE SYSTEM */
.files{
    margin-top:20px;
    background:#111;
    padding:15px;
    border-radius:10px;
}

.file{
    padding:8px;
    cursor:pointer;
}
.file:hover{ background:#222; }

/* GLITCH + SHAKE */
.glitch { animation:glitch 0.2s infinite; }
@keyframes glitch {50%{transform:translate(-3px,3px);}}

.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div id="terminal"></div>

<!-- LOCK -->
<div id="encryptionScreen">
    <div class="lock-card">
        <div id="encText">Initialisierung...</div>
        <div class="progress"><div class="progress-bar" id="bar"></div></div>
    </div>
</div>

<div class="app">

<aside class="sidebar">
    <div>Bewerbung</div>
    <div>System offline</div>
</aside>

<main class="main">
<h1>Bewerbungsportal</h1>

<div id="warning">Bewerbungen geschlossen</div>

<div class="login-box">
    <input placeholder="User ID">
    <input placeholder="Passwort" type="password">
    <button onclick="fakeLogin()">Login</button>

    <div class="progress"><div class="progress-bar" id="loginBar"></div></div>
    <p id="status"></p>
</div>

<!-- FILE SYSTEM -->
<div class="files">
    <div class="file" onclick="fakeDownload()">📁 user_data.zip</div>
    <div class="file" onclick="fakeDownload()">📁 passwords.db</div>
    <div class="file" onclick="fakeDownload()">📁 admin_access.key</div>
</div>

</main>
</div>

<script>

/* TERMINAL */
const lines=[
"root@server:~# init...",
"loading modules...",
"bypass firewall...",
"injecting packets..."
];

setInterval(()=>{
    const t=document.getElementById("terminal");
    t.innerHTML+=lines[Math.random()*lines.length|0]+"<br>";
    t.scrollTop=t.scrollHeight;
},200);

/* ENCRYPTION */
function runEncryption(){
    let p=0;
    const bar=document.getElementById("bar");

    const int=setInterval(()=>{
        p+=10;
        bar.style.width=p+"%";

        if(p>=100){
            clearInterval(int);
            document.getElementById("encryptionScreen").style.display="none";
        }
    },300);
}
runEncryption();

/* LOGIN */
function fakeLogin(){
    document.body.classList.add("shake");

    const bar=document.getElementById("loginBar");
    const status=document.getElementById("status");

    let p=0;

    const int=setInterval(()=>{
        p+=Math.random()*25;

        if(p>=99){
            p=99;
            clearInterval(int);
            status.innerText="❌ Zugriff verweigert";
        }

        bar.style.width=p+"%";
        status.innerText="Verbindung...";
    },200);
}

/* DOWNLOAD */
function fakeDownload(){
    const status=document.getElementById("status");

    let p=0;

    const int=setInterval(()=>{
        p+=15;
        status.innerText="Download "+p+"%";

        if(p>=100){
            clearInterval(int);
            triggerBreach();
        }
    },150);
}

/* BREACH */
function triggerBreach(){
    document.body.classList.add("glitch");

    const msgs=[
        "⚠️ UNAUTORISIERTER ZUGRIFF",
        "IP wird getrackt...",
        "NATO informiert..."
    ];

    let i=0;

    const int=setInterval(()=>{
        document.getElementById("warning").innerText=msgs[i%msgs.length];
        i++;
    },400);

    setTimeout(()=>{
        clearInterval(int);
        document.body.innerHTML="<h1 style='padding:100px'>💀 SYSTEM LOCKDOWN</h1>";
    },4000);

    setTimeout(()=>{
        document.body.innerHTML="<h1 style='padding:100px'>🤡 APRIL APRIL 😂</h1>";
    },8000);
}

</script>

</body>
</html>
